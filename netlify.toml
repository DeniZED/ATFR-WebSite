[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[functions]
  node_bundler = "esbuild"

# SPA fallback — Netlify route /.netlify/functions/* nativement avant
# cette règle, pas besoin de redirect explicite.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline' https://rsms.me https://fonts.googleapis.com; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://api.worldoftanks.eu https://static.modxvm.com https://cdn.discordapp.com https://discord.com; img-src 'self' data: https:; media-src 'self' https://*.supabase.co; font-src 'self' data: https://rsms.me https://fonts.gstatic.com; frame-ancestors 'none'; upgrade-insecure-requests"

# index.html doit avoir un cache court pour que les nouveaux déploiements
# soient pris en compte rapidement.
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
