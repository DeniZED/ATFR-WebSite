    <link

      type="image/png"
      href="https://eu.wargaming.net/clans/media/clans/emblems/cl_501/500191501/emblem_195x195.png"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0B0B0C" />

    <title>ATFR — Clan World of Tanks</title>
    <meta
      name="description"
      content="Clan World of Tanks français actif et compétitif. Stats live, recrutement ouvert, événements et classements de nos membres."
    />

    <meta property="og:type" content="website" />
    <meta property="og:title" content="ATFR — Clan World of Tanks" />
    <meta
      property="og:description"
      content="Clan World of Tanks français. Rejoignez l'un des clans FR les plus actifs."
    />
    <meta property="og:image" content="https://atfr-clan.netlify.app/og-image.png" />

    <meta property="og:site_name" content="ATFR Clan" />
    <meta property="og:locale" content="fr_FR" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ATFR — Clan World of Tanks" />

      name="twitter:description"
      content="Clan World of Tanks français. Rejoignez l'un des clans FR les plus actifs."
    />
    <meta name="twitter:image" content="https://atfr-clan.netlify.app/og-image.png" />

    <link rel="canonical" href="https://atfr-clan.netlify.app/" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Accélère l'accès aux médias Wargaming (emblème du Hero, proche du LCP). -->
    <link rel="preconnect" href="https://eu.wargaming.net" crossorigin />

    <!-- Préconnexion aux origines de polices pour réduire la latence.
         Le chargement reste bloquant (le CSP `script-src 'self'` interdit
         l'astuce `onload` non bloquante) ; les origines sont pré-résolues et
         `display=swap` évite le texte invisible sur Oswald. -->
    <link rel="preconnect" href="https://rsms.me/" crossorigin />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="bg-atfr-ink text-atfr-bone antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
